<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="design-style" content="奶油 毛玻璃 新拟态 毛茸茸">
  <title>密码进入 - 时间绒面</title>
  <link rel="stylesheet" href="css/fluffy.css">
</head>
<body class="fluffy-page password-page">
  <main class="prototype-gallery" aria-label="密码进入界面">
    <section class="device-frame desktop-artboard password-artboard" aria-label="电脑端密码界面">
      <div class="fluff-haze" aria-hidden="true"></div>
      <div class="password-card glass-fluff neumorphic-fluff">
        <p class="eyebrow">TIME VELVET</p>
        <h1>时间绒面</h1>
        <form class="password-form" data-password-form>
          <label for="desktopPassword">访问密码</label>
          <div class="password-input-wrap">
            <input class="password-input" id="desktopPassword" type="password" inputmode="numeric" placeholder="请输入密码">
            <button class="soft-icon-button" type="button" data-toggle-password aria-label="显示密码">◎</button>
          </div>
          <button class="primary-fluff" type="submit">进入</button>
        </form>
        <div class="soft-status" data-password-status>今日已同步 12 个时间事件</div>
      </div>
    </section>

    <section class="device-frame mobile-artboard password-artboard" aria-label="手机端密码界面">
      <div class="fluff-haze" aria-hidden="true"></div>
      <div class="phone-shell">
        <div class="phone-status" aria-hidden="true"><span>09:41</span><span>5G 100%</span></div>
        <div class="password-card glass-fluff neumorphic-fluff compact">
          <p class="eyebrow">TIME VELVET</p>
          <h2>时间绒面</h2>
          <form class="password-form" data-password-form>
            <label for="mobilePassword">访问密码</label>
            <div class="password-input-wrap">
              <input class="password-input" id="mobilePassword" type="password" inputmode="numeric" placeholder="请输入密码">
              <button class="soft-icon-button" type="button" data-toggle-password aria-label="显示密码">◎</button>
            </div>
            <button class="primary-fluff" type="submit">进入</button>
          </form>
          <div class="soft-status" data-password-status>今日已同步 12 个时间事件</div>
        </div>
      </div>
    </section>
  </main>
  <script src="js/fluffy.js"></script>
</body>
</html>
