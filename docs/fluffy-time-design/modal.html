<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="design-style" content="奶油 毛玻璃 新拟态 毛茸茸">
  <title>新增弹窗 - 时间绒面</title>
  <link rel="stylesheet" href="css/fluffy.css">
</head>
<body class="fluffy-page modal-page">
  <main class="prototype-gallery" aria-label="新增事件弹窗">
    <section class="device-frame desktop-artboard modal-artboard" aria-label="电脑端新增弹窗">
      <div class="modal-backdrop">
        <div class="dashboard-ghost glass-fluff">
          <h1>时间事件中心</h1>
          <p>春节 · 退休 · 结婚纪念日 · 出生</p>
        </div>
        <form class="add-event-modal glass-fluff neumorphic-fluff" data-modal-form>
          <div class="modal-head">
            <div>
              <p class="eyebrow">NEW EVENT</p>
              <h2>新增事件</h2>
            </div>
            <button class="soft-icon-button" type="button" aria-label="关闭">×</button>
          </div>
          <div class="modal-grid">
            <label>事件名称<input name="title" placeholder="例如：春节、退休"></label>
            <label>事件类型<select name="type"><option>节日</option><option>倒计时</option><option>周期性节日</option><option>已经过去了多少天</option></select></label>
            <label>日期体系<select name="calendar" data-calendar-select><option>公历</option><option>农历</option></select></label>
            <label>日期<input type="date" name="solarDate"></label>
            <label class="lunar-field">农历月份<select><option>正月</option><option>二月</option><option>五月</option><option>八月</option></select></label>
            <label class="lunar-field">农历日期<select><option>初一</option><option>十五</option><option>廿九</option></select></label>
            <label class="wide-field">备注<textarea placeholder="给这个时间点留一句话"></textarea></label>
          </div>
          <div class="switch-row">
            <label class="switch-label"><input type="checkbox">法定节假日</label>
            <label class="switch-label"><input type="checkbox">高速免费</label>
            <label class="switch-label"><input type="checkbox">每年循环</label>
          </div>
          <div class="modal-actions">
            <button class="ghost-fluff" type="button">取消</button>
            <button class="primary-fluff" type="submit">保存事件</button>
          </div>
        </form>
      </div>
    </section>

    <section class="device-frame mobile-artboard modal-artboard" aria-label="手机端新增弹窗">
      <div class="phone-shell modal-backdrop">
        <div class="phone-status" aria-hidden="true"><span>09:41</span><span>5G 100%</span></div>
        <form class="add-event-modal glass-fluff neumorphic-fluff" data-modal-form>
          <div class="modal-head">
            <div>
              <p class="eyebrow">NEW</p>
              <h2>新增事件</h2>
            </div>
            <button class="soft-icon-button" type="button" aria-label="关闭">×</button>
          </div>
          <div class="modal-grid">
            <label>事件名称<input name="title" placeholder="春节、退休"></label>
            <label>事件类型<select name="type"><option>节日</option><option>倒计时</option><option>周期性节日</option><option>已经过去了多少天</option></select></label>
            <label>日期体系<select name="calendar" data-calendar-select><option>公历</option><option>农历</option></select></label>
            <label>日期<input type="date" name="solarDate"></label>
            <label class="lunar-field">农历月份<select><option>正月</option><option>二月</option><option>五月</option><option>八月</option></select></label>
            <label class="lunar-field">农历日期<select><option>初一</option><option>十五</option><option>廿九</option></select></label>
            <label class="wide-field">备注<textarea placeholder="给这个时间点留一句话"></textarea></label>
          </div>
          <div class="switch-row">
            <label class="switch-label"><input type="checkbox">法定节假日</label>
            <label class="switch-label"><input type="checkbox">高速免费</label>
            <label class="switch-label"><input type="checkbox">每年循环</label>
          </div>
          <div class="modal-actions">
            <button class="ghost-fluff" type="button">取消</button>
            <button class="primary-fluff" type="submit">保存</button>
          </div>
        </form>
      </div>
    </section>
  </main>
  <script src="js/fluffy.js"></script>
</body>
</html>
